format = """
${custom.pwd}${custom.git_ref}${custom.aws_env}$kubernetes$cmd_duration$hostname
$character
"""

# ~/.config/starship.toml

[kubernetes]
format = '[$symbol$context( \($namespace\))]($style) '
disabled = false
symbol = '⛵ '
style = 'bold cyan'
contexts = [
  { context_pattern = "dev.local.cluster.k8s", style = "bold green", symbol = "💔 " },
]

[status]
disabled = false
format = '[x $status]($style) '

[cmd_duration]
min_time = 1500
format = '[took $duration]($style) '
style = 'dimmed yellow'

[hostname]
disabled = false
format = '[@$hostname]($style) '
ssh_only = true
style = 'dimmed white'

[git_commit]
commit_hash_length = 4
tag_symbol = '🔖 '

[git_status]
ahead = '[⇡${count}](bold yellow)'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '[⇣${count}](bold red)'
up_to_date = '[✓](bold green)'
stashed = '📦'
modified = '📝'
staged = '[++\($count\)](green)'
renamed = '👅'
deleted = '🗑'

[custom.pwd]
command = 'printf "%s" "${PWD/#$HOME/\~}"'
when = 'true'
format = '[$output]($style) '
style = 'bold blue'
shell = ['bash', '--noprofile', '--norc']

[custom.git_ref]
command = 'git branch --show-current 2>/dev/null || git describe --tags --exact-match 2>/dev/null || git rev-parse --short HEAD 2>/dev/null'
when = 'git rev-parse --is-inside-work-tree >/dev/null 2>&1'
format = '[on $output]($style) '
style = 'bold green'
shell = ['bash', '--noprofile', '--norc']

[custom.aws_env]
command = 'profile="${AWS_PROFILE:-${AWS_DEFAULT_PROFILE:-}}"; region="${AWS_REGION:-${AWS_DEFAULT_REGION:-us-gov-west-1}}"; if [ -n "$profile" ]; then printf "via aws %s (%s)" "$profile" "$region"; fi'
when = 'test -n "${AWS_PROFILE:-${AWS_DEFAULT_PROFILE:-}}"'
format = '[$output]($style) '
style = 'bold yellow'
shell = ['bash', '--noprofile', '--norc']

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'
